name: Release

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major
      custom_version:
        description: 'Custom version (e.g. v1.2.3). Overrides release type.'
        required: false
        type: string

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine Next Version
        id: version
        run: |
          # Get the latest tag by version sort, default to v0.0.0 if none
          LATEST_TAG=$(git tag --sort=-v:refname | head -n 1)
          LATEST_TAG=${LATEST_TAG:-v0.0.0}
          echo "Current version: $LATEST_TAG"

          if [ -n "${{ inputs.custom_version }}" ]; then
            NEW_TAG="${{ inputs.custom_version }}"
          else
            # Extract major, minor, patch
            # Remove 'v' prefix if present
            VERSION=${LATEST_TAG#v}
            IFS='.' read -r major minor patch <<< "$VERSION"
            
            # Default to 0 if empty (handling cases like v1 or v1.0)
            major=${major:-0}
            minor=${minor:-0}
            patch=${patch:-0}

            case "${{ inputs.release_type }}" in
              major)
                major=$((major + 1))
                minor=0
                patch=0
                ;;
              minor)
                minor=$((minor + 1))
                patch=0
                ;;
              patch)
                patch=$((patch + 1))
                ;;
            esac
            NEW_TAG="v$major.$minor.$patch"
          fi

          echo "New version: $NEW_TAG"
          echo "tag=$NEW_TAG" >> $GITHUB_OUTPUT

      - name: Create Tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ steps.version.outputs.tag }}
          git push origin ${{ steps.version.outputs.tag }}

      - name: Build Changelog
        id: build_changelog
        run: |
          LATEST_TAG=$(git tag --sort=-v:refname | grep -v "^${{ steps.version.outputs.tag }}$" | head -n 1)
          if [ -z "$LATEST_TAG" ]; then
            RAW=$(git log --pretty=format:"COMMIT_START%nSUBJECT:%s%nBODY:%b%nCOMMIT_END" --no-merges)
          else
            RAW=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"COMMIT_START%nSUBJECT:%s%nBODY:%b%nCOMMIT_END" --no-merges)
          fi

          # Extract individual changelog entries from commits
          # For squash merges with "* type: msg" body lines, use those instead of the subject
          ENTRIES=""
          SUBJECT=""
          BODY_ENTRIES=""
          IN_COMMIT=false

          while IFS= read -r line; do
            if [ "$line" = "COMMIT_START" ]; then
              IN_COMMIT=true
              SUBJECT=""
              BODY_ENTRIES=""
              continue
            fi

            if [ "$line" = "COMMIT_END" ]; then
              if [ -n "$BODY_ENTRIES" ]; then
                ENTRIES="${ENTRIES}${BODY_ENTRIES}"
              elif [ -n "$SUBJECT" ]; then
                ENTRIES="${ENTRIES}${SUBJECT}"$'\n'
              fi
              IN_COMMIT=false
              continue
            fi

            if [[ "$line" == SUBJECT:* ]]; then
              SUBJECT="${line#SUBJECT:}"
              continue
            fi

            if [[ "$line" == BODY:* ]]; then
              line="${line#BODY:}"
            fi

            # Parse body lines that match "* type: msg" pattern
            if [[ "$line" == \** ]]; then
              entry=$(echo "$line" | sed -E 's/^\* *//')
              if echo "$entry" | grep -qiE "^(feat|fix|perf|refactor|build|ci|chore|test|docs)(\(.*\))?:"; then
                BODY_ENTRIES="${BODY_ENTRIES}${entry}"$'\n'
              fi
            fi
          done <<< "$RAW"

          FEATURES=""
          FIXES=""
          PERFORMANCE=""
          REFACTOR=""
          CHORE=""
          OTHER=""

          while IFS= read -r line; do
            [ -z "$line" ] && continue
            if echo "$line" | grep -qiE "^feat(\(.*\))?:"; then
              msg=$(echo "$line" | sed -E 's/^feat(\(.*\))?: *//')
              FEATURES="${FEATURES}- ${msg}\n"
            elif echo "$line" | grep -qiE "^fix(\(.*\))?:"; then
              msg=$(echo "$line" | sed -E 's/^fix(\(.*\))?: *//')
              FIXES="${FIXES}- ${msg}\n"
            elif echo "$line" | grep -qiE "^perf(\(.*\))?:"; then
              msg=$(echo "$line" | sed -E 's/^perf(\(.*\))?: *//')
              PERFORMANCE="${PERFORMANCE}- ${msg}\n"
            elif echo "$line" | grep -qiE "^refactor(\(.*\))?:"; then
              msg=$(echo "$line" | sed -E 's/^refactor(\(.*\))?: *//')
              REFACTOR="${REFACTOR}- ${msg}\n"
            elif echo "$line" | grep -qiE "^(build|ci|chore|test|docs)(\(.*\))?:"; then
              msg=$(echo "$line" | sed -E 's/^(build|ci|chore|test|docs)(\(.*\))?: *//')
              CHORE="${CHORE}- ${msg}\n"
            else
              OTHER="${OTHER}- ${line}\n"
            fi
          done <<< "$ENTRIES"

          CHANGELOG=""
          [ -n "$FEATURES" ] && CHANGELOG="${CHANGELOG}## 🚀 Features\n${FEATURES}\n"
          [ -n "$FIXES" ] && CHANGELOG="${CHANGELOG}## 🐛 Bug Fixes\n${FIXES}\n"
          [ -n "$PERFORMANCE" ] && CHANGELOG="${CHANGELOG}## ⚡ Performance\n${PERFORMANCE}\n"
          [ -n "$REFACTOR" ] && CHANGELOG="${CHANGELOG}## ♻️ Refactor\n${REFACTOR}\n"
          [ -n "$CHORE" ] && CHANGELOG="${CHANGELOG}## 📦 Build & Chore\n${CHORE}\n"
          [ -n "$OTHER" ] && CHANGELOG="${CHANGELOG}## 📝 Other\n${OTHER}\n"

          # Write to file to preserve formatting
          echo -e "$CHANGELOG" > /tmp/changelog.md
          echo "changelog_file=/tmp/changelog.md" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body_path: ${{ steps.build_changelog.outputs.changelog_file }}
          draft: false
          prerelease: false

  trigger-docker:
    needs: release
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/docker.yml
    with:
      version: ${{ needs.release.outputs.tag }}
    secrets: inherit
