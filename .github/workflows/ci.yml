name: CI

on:
  pull_request:
  push:
    branches:
      - main

env:
  NODE_VERSION: "22"
  GO_VERSION: "1.25.8"

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      frontend: ${{ steps.filter.outputs.frontend }}
      backend: ${{ steps.filter.outputs.backend }}
      app: ${{ steps.filter.outputs.app }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            frontend:
              - 'web/**'
            backend:
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'
            app:
              - 'web/**'
              - 'cmd/**'
              - 'internal/**'
              - 'go.mod'
              - 'go.sum'

  frontend:
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Lint
        run: npm run lint
        working-directory: web

      - name: Unit Tests
        run: npm run test
        working-directory: web

  backend:
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.6

      - name: Security Scan (gosec)
        run: |
          go install github.com/securego/gosec/v2/cmd/gosec@latest
          gosec -exclude-dir=web ./...

      - name: Vulnerability Check (govulncheck)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Dependency Vulnerability Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          ignore-unfixed: true

      - name: Unit Tests
        run: |
          go clean -testcache
          go test ./...

  e2e:
    needs: changes
    if: needs.changes.outputs.app == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Cache Playwright Binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - name: Install dependencies
        working-directory: web
        run: |
          npm ci
          npx playwright install --with-deps

      - name: Build Frontend
        working-directory: web
        run: npm run build

      - name: Build Backend
        run: go build -o warden ./cmd/dashboard

      - name: Start Full Stack
        env:
          ADMIN_SECRET: warden-e2e-magic-key
        run: |
          rm -f warden.db
          ./warden &
          echo "Waiting for server to start..."
          sleep 5

      - name: Run E2E Tests
        working-directory: web
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:9096
        run: npx playwright test --fail-on-flaky-tests
